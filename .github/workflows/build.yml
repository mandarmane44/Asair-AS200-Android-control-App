name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    # Force create with a safe internal name
    - run: flutter create --project-name asair_mfc_app --platforms android .
    
    - run: flutter pub get
    
    # Rename the app for the Tablet Home Screen
    - run: dart pub global activate rename
    - run: rename setAppName --targets android --value "ASAir AS200 Control"
    
    - run: flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: asair-tablet-app
        path: build/app/outputs/flutter-apk/app-release.apk
