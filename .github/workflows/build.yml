name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    # 1. Create the project structure
    - run: flutter create --project-name asair_mfc_app --platforms android .
    
    # 2. FORCE: Overwrite the demo app with YOUR main.dart
    - run: cp lib/main.dart ./lib/main.dart
    
    # 3. FORCE: Set modern Android compatibility (Min SDK 21, Target 34)
    - run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

    - run: flutter pub get
    
    - run: dart pub global activate rename
    - run: rename setAppName --targets android --value "ASAir AS200 Control"
    
    - run: flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: asair-tablet-app
        path: build/app/outputs/flutter-apk/app-release.apk
